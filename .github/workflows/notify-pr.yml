name: Notify Slack on PR

on:
  pull_request:
    types: [opened, ready_for_review]

jobs:
  notify:
    runs-on: ubuntu-latest
    if: "!github.event.pull_request.draft"
    steps:
      - uses: actions/checkout@v4
      - name: Read client identity
        id: client
        run: |
          echo "upper=$(jq -r .upper .resin/client.json)" >> "$GITHUB_OUTPUT"
      - name: Post to Slack
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "[${{ steps.client.outputs.upper }}] PR ready for review: *${{ github.event.pull_request.title }}*\n${{ github.event.pull_request.html_url }}"
            }
